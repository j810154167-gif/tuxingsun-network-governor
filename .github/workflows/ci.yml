name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q src tests
      - name: Unit tests
        run: python -m pytest
      - name: Build package
        run: python -m build
      - name: Release artifact guard
        run: python scripts/release_guard.py
