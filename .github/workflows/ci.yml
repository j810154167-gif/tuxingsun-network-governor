name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e .
      - name: Compile
        run: python -m compileall -q src tests
      - name: Unit smoke tests
        run: PYTHONPATH=src python tests/test_mvp.py
      - name: Release artifact guard
        run: python scripts/release_guard.py
